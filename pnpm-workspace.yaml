# Rendara uses Nx's classic layout: internal projects are linked via TypeScript
# path aliases (tsconfig.base.json "paths"), NOT pnpm package workspaces.
#
# Registered below: the two PUBLISHABLE packages (report-schema, report-viewer)
# so Changesets can discover and version them (E0-S7), plus report-engine and
# report-renderer — these are `private: true` (Changesets ignores them) but are
# listed so pnpm can link them as `workspace:*` dependencies of report-viewer.
# report-viewer's APF build bundles engine/renderer/schema in and strips the
# `@rendara/*` deps from the published tarball (E9-S1, see ADR 0013).
packages:
  - 'libs/report-schema'
  - 'libs/report-engine'
  - 'libs/report-renderer'
  - 'libs/report-viewer'

# allowBuilds lists dependencies permitted to run install/postinstall scripts
# under pnpm's secure-by-default policy.
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: false
  lmdb: true
  msgpackr-extract: true
  nx: true
minimumReleaseAgeExclude:
  - '@nx/angular@23.0.0'
  - '@nx/devkit@23.0.0'
  - '@nx/eslint-plugin@23.0.0'
  - '@nx/eslint@23.0.0'
  - '@nx/js@23.0.0'
  - '@nx/module-federation@23.0.0'
  - '@nx/nx-darwin-arm64@23.0.0'
  - '@nx/nx-darwin-x64@23.0.0'
  - '@nx/nx-freebsd-x64@23.0.0'
  - '@nx/nx-linux-arm-gnueabihf@23.0.0'
  - '@nx/nx-linux-arm64-gnu@23.0.0'
  - '@nx/nx-linux-arm64-musl@23.0.0'
  - '@nx/nx-linux-x64-gnu@23.0.0'
  - '@nx/nx-linux-x64-musl@23.0.0'
  - '@nx/nx-win32-arm64-msvc@23.0.0'
  - '@nx/nx-win32-x64-msvc@23.0.0'
  - '@nx/rspack@23.0.0'
  - '@nx/web@23.0.0'
  - '@nx/webpack@23.0.0'
  - '@nx/workspace@23.0.0'
  - nx@23.0.0
