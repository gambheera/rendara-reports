<!-- E7-S2 render pipeline: validate -> bind -> paginate -> render through the
     shared engine + renderer. A successful pipeline paints the paginated
     document; an empty or errored pipeline paints nothing (the loading/empty/
     error UI lands in E7-S5). -->
@if (renderModel(); as model) {
<rdr-report-document
  [document]="model.document"
  [template]="model.template"
  [resolvedValues]="model.resolvedValues"
  [zoom]="initialZoom()"
  [layout]="pageMode()"
/>
}
