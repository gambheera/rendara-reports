<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "secondary-fixed": "#dce2f3",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 20px;
        }
        .modal-overlay {
            background-color: rgba(27, 27, 36, 0.4);
            backdrop-filter: blur(2px);
        }
        .drop-zone-dashed {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' stroke='%23D1D5DB' stroke-width='2' stroke-dasharray='6%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="bg-workspace-backdrop font-body-md text-text-primary h-screen overflow-hidden">
<!-- Background Workspace (Dimmed) -->
<aside class="flex h-screen w-64 fixed left-0 top-0 flex-col py-panel-padding bg-surface border-r border-hairline transition-all">
<div class="px-6 mb-8">
<h1 class="font-headline-lg text-headline-lg font-bold text-primary">ReportGen Pro</h1>
<p class="text-secondary font-caption text-caption">Technical Reporting</p>
</div>
<nav class="flex-1 space-y-1 px-3">
<div class="flex items-center gap-3 px-3 h-row-height-sm bg-accent-subtle text-primary border-l-2 border-primary cursor-pointer">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-body-md text-body-md">Workspace</span>
</div>
<div class="flex items-center gap-3 px-3 h-row-height-sm text-secondary hover:bg-surface-container-low cursor-pointer transition-colors duration-200">
<span class="material-symbols-outlined">description</span>
<span class="font-body-md text-body-md">Reports</span>
</div>
<div class="flex items-center gap-3 px-3 h-row-height-sm text-secondary hover:bg-surface-container-low cursor-pointer transition-colors duration-200">
<span class="material-symbols-outlined">insights</span>
<span class="font-body-md text-body-md">Analytics</span>
</div>
</nav>
</aside>
<header class="fixed top-0 right-0 left-64 h-control-height flex items-center justify-between px-panel-padding h-12 ml-64 bg-surface border-b border-hairline z-0">
<div class="flex items-center gap-6">
<span class="font-section-header text-section-header font-semibold text-on-surface">Workspace</span>
<nav class="flex gap-4">
<span class="text-secondary hover:text-primary transition-all cursor-pointer font-section-header text-section-header">Documents</span>
<span class="text-secondary hover:text-primary transition-all cursor-pointer font-section-header text-section-header">Shared</span>
<span class="text-secondary hover:text-primary transition-all cursor-pointer font-section-header text-section-header">Archive</span>
</nav>
</div>
<div class="flex items-center gap-3">
<button class="px-3 h-control-height text-secondary border border-border-input hover:bg-surface-container-low transition-colors font-label-sm text-label-sm">Share</button>
<button class="px-3 h-control-height bg-primary text-white hover:bg-accent-hover transition-colors font-label-sm text-label-sm">Export</button>
</div>
</header>
<main class="ml-64 mt-12 p-8 h-[calc(100vh-48px)] flex items-center justify-center relative overflow-hidden">
<!-- Mock Report Content -->
<div class="w-[800px] bg-white shadow-sm h-full p-12 opacity-40 select-none">
<div class="h-8 w-1/3 bg-surface-container-high mb-6"></div>
<div class="h-4 w-full bg-surface-container mb-2"></div>
<div class="h-4 w-full bg-surface-container mb-2"></div>
<div class="h-4 w-2/3 bg-surface-container mb-8"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 bg-surface-container-low rounded border border-hairline"></div>
<div class="h-32 bg-surface-container-low rounded border border-hairline"></div>
</div>
</div>
<!-- MODAL OVERLAY -->
<div class="modal-overlay absolute inset-0 z-50 flex items-center justify-center">
<!-- MODAL DIALOG -->
<section class="w-[560px] bg-surface rounded-xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
<!-- HEADER TABS -->
<div class="px-6 pt-6 flex items-center justify-between border-b border-hairline relative">
<div class="flex gap-8">
<button class="pb-3 text-secondary hover:text-text-primary font-section-header text-section-header transition-colors">
                            Export
                        </button>
<button class="pb-3 text-primary border-b-2 border-primary font-section-header text-section-header">
                            Import
                        </button>
</div>
<button class="absolute right-4 top-4 p-1 text-secondary hover:bg-surface-container-low rounded transition-colors" title="Close">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- MODAL BODY -->
<div class="p-6 space-y-6">
<!-- DROP ZONE -->
<div class="drop-zone-dashed bg-recessed-panel h-40 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-low transition-colors group">
<div class="w-10 h-10 rounded-full bg-accent-subtle flex items-center justify-center text-primary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 500;">upload_file</span>
</div>
<p class="font-body-md-medium text-body-md-medium text-text-primary">
                            Drop a .json file here or <span class="text-primary underline decoration-primary/30">browse</span>
</p>
<p class="mt-2 font-caption text-caption text-secondary">
                            Older templates are migrated automatically
                        </p>
</div>
<!-- VALIDATION SUCCESS ROW -->
<div class="flex items-center justify-between p-3 bg-accent-subtle border border-primary/10 rounded">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-5 h-5 rounded-full bg-success/10 text-success">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1, 'wght' 600;">check_circle</span>
</div>
<span class="font-body-md text-body-md text-text-primary">Template-v1.4.json validated successfully</span>
</div>
<span class="font-data-mono text-data-mono text-secondary">24 KB</span>
</div>
</div>
<!-- FOOTER -->
<div class="px-6 py-4 bg-surface-container-lowest flex items-center justify-end gap-3 border-t border-hairline">
<button class="h-control-height px-4 font-label-sm text-label-sm text-text-primary border border-border-input hover:bg-surface-container-low transition-all rounded">
                        Cancel
                    </button>
<button class="h-control-height px-6 font-label-sm text-label-sm bg-primary text-white hover:bg-accent-hover shadow-sm transition-all rounded">
                        Import Template
                    </button>
</div>
</section>
</div>
</main>
<!-- Contextual FAB (Hidden as per rule) -->
<script>
        // Simple micro-interaction for the file zone
        const dropZone = document.querySelector('.drop-zone-dashed');
        if (dropZone) {
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('bg-accent-subtle');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('bg-accent-subtle');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('bg-accent-subtle');
            });
        }
    </script>
</body></html>
