# Release tooling & commit hygiene (E0-S7).
#
# Two independent gates that enforce commit hygiene and prove the release flow
# in CI (local git hooks can be bypassed with --no-verify, so the checks are
# repeated here):
#   * commitlint      — validate every commit on the PR against Conventional Commits.
#   * publish-dry-run — `pnpm -r publish --dry-run` for the publishable packages
#                       (no real publish — packaging/APF build lands in E9).
#
# Like .github/workflows/storybook.yml this is a thin, self-contained slice.
# E0-S3 (CI pipeline) should fold these into the main `nx affected` pipeline
# (install -> lint -> typecheck -> test -> build) with Nx caching + branch
# protection, and may then drop this file.
name: Release

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to lint the whole PR commit range.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commits in this push/PR
        env:
          # On a PR, lint base..head; on a push, lint just the new commit(s).
          FROM: ${{ github.event.pull_request.base.sha || github.event.before }}
          TO: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pnpm exec commitlint --from "$FROM" --to "$TO" --verbose

  publish-dry-run:
    name: Publish dry-run (no real publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dry-run publish of @rendara/report-schema + @rendara/report-viewer
        run: pnpm release:dry-run

  viewer-apf-build:
    name: Publishable viewer build (APF) + npm pack (E9-S1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds schema → engine → renderer → viewer (APF), inlines engine/renderer/
      # schema into the viewer, then `npm pack`s and asserts the tarball is APF and
      # self-contained (no @rendara/* deps leak). See ADR 0013.
      - name: Build + bundle + pack @rendara/report-viewer
        run: pnpm nx run report-viewer:pack --skip-nx-cache

  schema-pack:
    name: Framework-agnostic schema build + Node smoke test (E9-S3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds @rendara/report-schema framework-agnostic (no Angular, dual ESM+CJS),
      # then `npm pack`s and asserts the tarball is Angular-free and consumable in
      # Node (imports + validates a golden via both import and require). See ADR 0015.
      - name: Build + pack @rendara/report-schema
        run: pnpm nx run report-schema:pack --skip-nx-cache

  viewer-demo-integration:
    name: viewer-demo consumes the built package + e2e (E9-S4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Static guard: the demo resolves @rendara/report-viewer to the installed
      # built package, not workspace source (E9-S4 acceptance). See ADR 0016.
      - name: Assert demo consumes the built package (not source)
        run: node tools/verify-demo-consumes-build.mjs

      # End-to-end proof: builds + bundles the viewer, installs it into
      # node_modules, builds the demo against it (so the Angular Linker resolves
      # the partial FESM), serves the production build and drives the report —
      # render, page navigation, the rendered/pageChange/error outputs, print and
      # export PDF. The `serve-static` webServer runs the whole chain.
      - name: Run viewer-demo integration e2e
        run: pnpm nx e2e viewer-demo-e2e --skip-nx-cache

  viewer-clean-room:
    name: Clean-room install smoke test (E9-S7) — release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Proof the package works OUTSIDE the monorepo: builds + bundles the viewer,
      # `npm pack`s it, installs the tarball into a fresh external Angular app in a
      # throwaway temp dir, AOT-builds it, and drives it in headless Chromium to
      # assert the report renders (catching the runtime Linker "JIT compiler
      # unavailable" regression a build-only check misses). See ADR 0019.
      - name: Clean-room install + render smoke test
        run: pnpm nx run report-viewer:clean-room --skip-nx-cache
