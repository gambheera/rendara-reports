<div class="rdr-status-bar__group">
  <button
    type="button"
    class="rdr-status-bar__zoom-btn"
    [attr.aria-label]="i18n.t('statusBar.zoomOut')"
    (click)="zoomOut()"
  >
    −
  </button>
  <span class="rdr-status-bar__zoom">{{ zoom() }}</span>
  <button
    type="button"
    class="rdr-status-bar__zoom-btn"
    [attr.aria-label]="i18n.t('statusBar.zoomIn')"
    (click)="zoomIn()"
  >
    +
  </button>
  <button type="button" class="rdr-status-bar__fit" (click)="fitToView.emit()">
    {{ i18n.t('statusBar.fit') }}
  </button>
  <button
    type="button"
    class="rdr-status-bar__fit rdr-status-bar__snap"
    [class.rdr-status-bar__snap--on]="snapEnabled()"
    [attr.aria-pressed]="snapEnabled()"
    [attr.aria-label]="i18n.t('statusBar.snapAria')"
    [title]="i18n.t('statusBar.snapTitle')"
    (click)="toggleSnap()"
  >
    {{ i18n.t('statusBar.snap') }}
  </button>
</div>

<div class="rdr-status-bar__group rdr-status-bar__center">
  <button
    type="button"
    class="rdr-status-bar__page"
    aria-haspopup="dialog"
    [attr.aria-label]="i18n.t('statusBar.pageSetupAria', { summary: pageSummary() })"
    (click)="openPageSetup.emit()"
  >
    {{ pageSummary() }}
  </button>
</div>

<div class="rdr-status-bar__group">
  <span>{{ pageCounter() }}</span>
  <span class="rdr-status-bar__hint">{{ i18n.t('statusBar.hint') }}</span>
</div>
