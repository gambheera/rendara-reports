<div class="rdr-status-bar__group">
  <button type="button" class="rdr-status-bar__zoom-btn" aria-label="Zoom out" disabled>−</button>
  <span class="rdr-status-bar__zoom">{{ zoom }}</span>
  <button type="button" class="rdr-status-bar__zoom-btn" aria-label="Zoom in" disabled>+</button>
  <button type="button" class="rdr-status-bar__fit" disabled>Fit</button>
</div>

<div class="rdr-status-bar__group rdr-status-bar__center">
  <span>{{ pageSummary }}</span>
</div>

<div class="rdr-status-bar__group">
  <span>{{ pageCounter }}</span>
  <span class="rdr-status-bar__hint">⌘D Duplicate · Shift Snap to grid</span>
</div>
