<!-- tabindex makes the scrollable canvas keyboard-reachable so it can be scrolled
     with the arrow keys (E10-S1, WCAG 2.1.1 / axe scrollable-region-focusable). It
     lives inside the labelled `main` ("Report canvas"), so it needs no own name. -->
<div
  #scroll
  class="rdr-canvas__scroll"
  tabindex="0"
  [style.backgroundSize]="gridSizePx() + ' ' + gridSizePx()"
>
  <div class="rdr-canvas__grid">
    <div class="rdr-canvas__corner" aria-hidden="true"></div>

    <div class="rdr-canvas__ruler rdr-canvas__ruler--h" aria-hidden="true">
      @for (tick of horizontalTicks(); track tick.posPx) {
      <span class="rdr-canvas__tick" [style.left.px]="tick.posPx + pad">
        @if (tick.label !== null) {
        <span class="rdr-canvas__tick-label">{{ tick.label }}</span>
        }
      </span>
      }
    </div>

    <div class="rdr-canvas__ruler rdr-canvas__ruler--v" aria-hidden="true">
      @for (tick of verticalTicks(); track tick.posPx) {
      <span class="rdr-canvas__tick" [style.top.px]="tick.posPx + pad">
        @if (tick.label !== null) {
        <span class="rdr-canvas__tick-label">{{ tick.label }}</span>
        }
      </span>
      }
    </div>

    <div
      class="rdr-canvas__pages"
      [class.rdr-canvas__pages--bind-target]="bindTarget()"
      cdkDropList
      [id]="canvasDropListId"
      cdkDropListSortingDisabled
      (cdkDropListDropped)="onDrop($event)"
      (cdkDropListEntered)="onListEntered($event)"
      (cdkDropListExited)="onListExited()"
      (pointerdown)="onCanvasPointerDown($event)"
    >
      <rdr-report-document
        class="rdr-canvas__doc"
        [style.width.px]="pageBox().widthPx"
        [document]="store.paginatedDocument()"
        [template]="store.template()"
        [resolvedValues]="preview.resolvedValues()"
        [zoom]="store.zoom()"
        mode="design"
        layout="continuous"
      />

      @if (isEmpty()) {
      <div
        class="rdr-canvas__empty"
        [style.width.px]="pageBox().widthPx"
        [style.height.px]="pageBox().heightPx"
      >
        <span class="rdr-canvas__empty-glyph" aria-hidden="true">✥</span>
        <p class="rdr-canvas__empty-text">Drag a control here to begin</p>
      </div>
      }

      <rdr-selection-overlay
        class="rdr-canvas__overlay"
        [style.width.px]="pageBox().widthPx"
        [style.height.px]="pageBox().heightPx"
      />

      @if (marquee(); as rect) {
      <div
        class="rdr-canvas__marquee"
        aria-hidden="true"
        [style.left.px]="rect.leftPx"
        [style.top.px]="rect.topPx"
        [style.width.px]="rect.widthPx"
        [style.height.px]="rect.heightPx"
      ></div>
      }
    </div>
  </div>
</div>
