<div class="rdr-top-bar__lead">
  <span class="rdr-top-bar__wordmark">Rendara</span>
  <span class="rdr-top-bar__divider" aria-hidden="true"></span>
  <span class="rdr-top-bar__doc-name">{{ documentName() }}</span>
  <button
    type="button"
    rdr-button
    variant="ghost"
    class="rdr-top-bar__icon-btn"
    [attr.aria-label]="i18n.t('topBar.renameDocument')"
    disabled
  >
    <span class="rdr-top-bar__icon" aria-hidden="true">&#9998;</span>
  </button>
  <span class="rdr-top-bar__status" [class.rdr-top-bar__status--dirty]="dirty()" aria-live="polite">
    <span class="rdr-top-bar__status-dot" aria-hidden="true"></span>
    {{ statusLabel() }}
  </span>
</div>

<div class="rdr-top-bar__actions">
  <button type="button" rdr-button variant="ghost" (click)="newDocument()">
    {{ i18n.t('topBar.new') }}
  </button>
  <button type="button" rdr-button variant="ghost" (click)="openImport()">
    {{ i18n.t('topBar.open') }}
  </button>
  <button type="button" rdr-button variant="secondary" disabled>
    {{ i18n.t('topBar.importData') }}
  </button>
  <button type="button" rdr-button variant="secondary" (click)="enterPreview()">
    {{ i18n.t('topBar.preview') }}
  </button>
  <button type="button" rdr-button variant="primary" (click)="openExport()">
    {{ i18n.t('topBar.export') }}
  </button>
  <button
    type="button"
    rdr-button
    variant="ghost"
    class="rdr-top-bar__icon-btn"
    [attr.aria-label]="i18n.t('topBar.moreActions')"
    disabled
  >
    <span class="rdr-top-bar__icon" aria-hidden="true">&#8943;</span>
  </button>
</div>

<rdr-export-import-dialog />
