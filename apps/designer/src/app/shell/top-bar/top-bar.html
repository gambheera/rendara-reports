<div class="rdr-top-bar__lead">
  <span class="rdr-top-bar__wordmark">Rendara</span>
  <span class="rdr-top-bar__divider" aria-hidden="true"></span>
  <span class="rdr-top-bar__doc-name">{{ documentName }}</span>
  <button
    type="button"
    rdr-button
    variant="ghost"
    class="rdr-top-bar__icon-btn"
    aria-label="Rename document"
    disabled
  >
    <span class="rdr-top-bar__icon" aria-hidden="true">&#9998;</span>
  </button>
  <span class="rdr-top-bar__status">
    <span class="rdr-top-bar__status-dot" aria-hidden="true"></span>
    Saved
  </span>
</div>

<div class="rdr-top-bar__actions">
  <button type="button" rdr-button variant="secondary" disabled>Import data</button>
  <button type="button" rdr-button variant="secondary" disabled>Preview</button>
  <button type="button" rdr-button variant="primary" disabled>Export</button>
  <button
    type="button"
    rdr-button
    variant="ghost"
    class="rdr-top-bar__icon-btn"
    aria-label="More actions"
    disabled
  >
    <span class="rdr-top-bar__icon" aria-hidden="true">&#8943;</span>
  </button>
</div>
