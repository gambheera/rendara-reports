<header class="rdr-preview__bar" role="banner">
  <div class="rdr-preview__lead">
    <button type="button" class="rdr-preview__back" (click)="exit()">
      <span class="rdr-preview__back-icon" aria-hidden="true">‹</span>
      {{ i18n.t('preview.backToEditor') }}
    </button>
    <span class="rdr-preview__divider" aria-hidden="true"></span>
    <span class="rdr-preview__doc-name">{{ documentName }}</span>
    <span class="rdr-preview__badge">{{ i18n.t('preview.badge') }}</span>
  </div>

  <div class="rdr-preview__center">
    <button
      type="button"
      class="rdr-preview__nav"
      (click)="prevPage()"
      [disabled]="!canPrev()"
      [attr.aria-label]="i18n.t('preview.previousPage')"
    >
      ‹
    </button>
    <span class="rdr-preview__page" [attr.aria-label]="i18n.t('preview.pageNavigation')">{{
      pageLabel()
    }}</span>
    <button
      type="button"
      class="rdr-preview__nav"
      (click)="nextPage()"
      [disabled]="!canNext()"
      [attr.aria-label]="i18n.t('preview.nextPage')"
    >
      ›
    </button>

    <span class="rdr-preview__divider" aria-hidden="true"></span>

    <button
      type="button"
      class="rdr-preview__nav"
      (click)="zoomOut()"
      [attr.aria-label]="i18n.t('preview.zoomOut')"
    >
      −
    </button>
    <span class="rdr-preview__zoom">{{ zoomPercent() }}%</span>
    <button
      type="button"
      class="rdr-preview__nav"
      (click)="zoomIn()"
      [attr.aria-label]="i18n.t('preview.zoomIn')"
    >
      +
    </button>
  </div>

  <div class="rdr-preview__actions">
    <span class="rdr-preview__source">{{ sourceHint() }}</span>
  </div>
</header>

<div class="rdr-preview__stage">
  <rdr-report-document
    class="rdr-preview__doc"
    [document]="store.paginatedDocument()"
    [template]="store.template()"
    [resolvedValues]="preview.resolvedValues()"
    [zoom]="zoom()"
    [currentPage]="page()"
    [direction]="direction()"
    mode="view"
    layout="single"
  />
</div>
