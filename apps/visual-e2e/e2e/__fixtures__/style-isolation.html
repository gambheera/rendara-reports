<style>:host {
  --rdr-page-background: #ffffff;
  --rdr-page-shadow: 0 1px 3px rgba(15, 23, 42, 0.18), 0 4px 12px rgba(15, 23, 42, 0.12);
  --rdr-printable-guide: rgba(79, 70, 229, 0.25);
  --rdr-page-gap: 24px;
  --rdr-font-family: 'Inter', system-ui, sans-serif;
  --rdr-text-color: #111827;
  --rdr-table-header-fill: #F1F5F9;
  --rdr-table-group-fill: #EEF2FF;
  --rdr-table-detail-rule: #E2E8F0;
  --rdr-table-band-rule: #CBD5E1;
  --rdr-table-total-rule: #334155;
  --rdr-watermark-color: #9CA3AF;
  --rdr-search-highlight: #FDE68A;
  --rdr-search-active: #FBBF24;

  display: block;
}

:host,
.rdr-document,
.rdr-page {
  /* CSS reset: neutralise inheritable host typography so the host page's styles
     cannot cascade into the rendered report. */
  color: var(--rdr-text-color);
  font-family: var(--rdr-font-family);
  font-size: medium;
  font-weight: 400;
  font-style: normal;
  font-variant: normal;
  font-stretch: normal;
  line-height: normal;
  letter-spacing: normal;
  word-spacing: normal;
  text-align: left;
  text-transform: none;
  text-indent: 0;
  text-decoration: none;
  text-shadow: none;
  white-space: normal;
  word-break: normal;
  direction: ltr;
  font-feature-settings: normal;
  -webkit-font-smoothing: auto;
}

.rdr-page {
  box-shadow: var(--rdr-page-shadow);
  overflow: hidden;
}

.rdr-printable {
  outline: 1px dashed var(--rdr-printable-guide);
  pointer-events: none;
}

.rdr-text {
  margin: 0;
}

/* Search highlight (E8-S6): matched runs are wrapped in <mark class="rdr-mark">.
   Inherit the run's own colour/weight and only tint the background so the marked
   text stays legible; the active match (current next/prev target) gets a stronger
   tint. The viewer toggles the rdr-mark--active class on the live DOM; the style
   lives here so it applies within the renderer's own (emulated/shadow) scope. */
.rdr-mark {
  background: var(--rdr-search-highlight, #fde68a);
  color: inherit;
  border-radius: 1px;
}

.rdr-mark--active {
  background: var(--rdr-search-active, #fbbf24);
}

.rdr-image {
  display: block;
}

/* Watermark overlay (E4-S7): the page-covering layer + its centred caption/image.
   The size/opacity/rotation/colour stay inline on the elements (data-driven); these
   are the static resets so the caption/image paint predictably. */
.rdr-watermark {
  margin: 0;
}

.rdr-watermark-text {
  margin: 0;
}

.rdr-watermark-image {
  display: block;
}

/* Design-mode hooks (E4-S6): only matches when the page carries the design marker,
   so view-mode DOM/painting is unaffected. Hit targets become pointer-selectable
   for the designer canvas. */
.rdr-page[data-rdr-mode='design'] [data-rdr-hit] {
  cursor: pointer;
}

.rdr-document {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--rdr-page-gap);
}

.rdr-document--single {
  gap: 0;
}

.rdr-page-slot {
  position: relative;
  overflow: hidden;
  flex: 0 0 auto;
}

.rdr-page-slot rdr-report-renderer,
.rdr-page-slot .rdr-page {
  position: absolute;
  top: 0;
  left: 0;
}

@media print {
  :host,
  .rdr-document,
  .rdr-page,
  .rdr-page-slot {
    background: #ffffff;
  }

  .rdr-document {
    gap: 0;
  }

  .rdr-page {
    box-shadow: none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .rdr-printable {
    outline: none;
  }

  @page {
    margin: 0;
  }
